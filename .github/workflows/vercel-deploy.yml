name: Deploy to Vercel (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate Vercel secrets
        shell: bash
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required secret: VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing required secret: VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required secret: VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy to production
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
