name: CI and Deploy to Vercel (Production)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python dependency graph
        run: pip check

      - name: Static compile check
        run: python -m compileall -q api telegram database

      - name: App smoke check
        run: python scripts/ci_smoke.py

  deploy:
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      TELEGRAM_PUBLIC_BASE_URL: ${{ secrets.TELEGRAM_PUBLIC_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate Vercel secrets
        shell: bash
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required secret: VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing required secret: VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required secret: VERCEL_PROJECT_ID"
            exit 1
          fi
          if [ -z "$TELEGRAM_PUBLIC_BASE_URL" ]; then
            echo "Missing required secret: TELEGRAM_PUBLIC_BASE_URL"
            exit 1
          fi

      - name: Sync Telegram public base URL to Vercel env
        shell: bash
        run: |
          vercel env rm TELEGRAM_PUBLIC_BASE_URL production --yes --token="$VERCEL_TOKEN" >/dev/null 2>&1 || true
          printf '%s' "$TELEGRAM_PUBLIC_BASE_URL" | vercel env add TELEGRAM_PUBLIC_BASE_URL production --token="$VERCEL_TOKEN"

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build on CI using Vercel
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
